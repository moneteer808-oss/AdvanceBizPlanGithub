let chartInstances = {};

function fmt(n, currency = 'USD', decimals = 0){
  const currencySymbols = {
    'USD': '$', 'EUR': '€', 'GBP': '£', 'CAD': 'C$', 'AUD': 'A$'
  };
  const symbol = currencySymbols[currency] || '$';
  const formatted = new Intl.NumberFormat('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  }).format(Math.round(n * Math.pow(10, decimals)) / Math.pow(10, decimals));
  return symbol + formatted;
}

function calculateCustomerLifetimeValue(avgValue, churnRate, variableCostPct) {
  const monthlyMargin = avgValue * (1 - variableCostPct/100);
  const lifetimeMonths = 1 / (churnRate/100);
  return monthlyMargin * lifetimeMonths;
}

function generateFinancialProjections(data) {
  let projections = {
    months: [],
    customers: [],
    revenue: [],
    variableCosts: [],
    fixedCosts: [],
    marketingCosts: [],
    grossProfit: [],
    netProfit: [],
    cumulativeCash: [],
    newCustomers: []
  };

  let currentCustomers = data.monthlyCustomers;
  let cumulativeCash = -data.fundingAmount; // Start with funding received
  
  for(let month = 1; month <= 36; month++) {
    // Customer growth model with realistic constraints
    let growthRate = month <= 6 ? 0.15 : month <= 12 ? 0.12 : month <= 24 ? 0.08 : 0.05;
    let newCustomers = Math.round(data.marketingBudget / data.cac);
    let churnedCustomers = Math.round(currentCustomers * (data.churnRate/100));
    currentCustomers = Math.max(0, currentCustomers - churnedCustomers + newCustomers);
    
    // Financial calculations
    let revenue = currentCustomers * data.avgCustomerValue;
    let variableCosts = revenue * (data.variableCosts/100);
    let fixedCosts = data.fixedCosts;
    let marketingCosts = data.marketingBudget;
    let grossProfit = revenue - variableCosts;
    let netProfit = grossProfit - fixedCosts - marketingCosts;
    
    cumulativeCash += netProfit;
    
    projections.months.push(`M${month}`);
    projections.customers.push(currentCustomers);
    projections.revenue.push(revenue);
    projections.variableCosts.push(variableCosts);
    projections.fixedCosts.push(fixedCosts);
    projections.marketingCosts.push(marketingCosts);
    projections.grossProfit.push(grossProfit);
    projections.netProfit.push(netProfit);
    projections.cumulativeCash.push(cumulativeCash);
    projections.newCustomers.push(newCustomers);
  }
  
  return projections;
}

function createChart(canvasId, config) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  
  // Destroy existing chart if it exists
  if (chartInstances[canvasId]) {
    chartInstances[canvasId].destroy();
  }
  
  chartInstances[canvasId] = new Chart(canvas, config);
  return chartInstances[canvasId];
}

function showTab(tabName) {
  // Hide all tab contents
  const tabContents = document.querySelectorAll('.tab-content');
  tabContents.forEach(content => {
    content.classList.remove('active');
  });
  
  // Remove active class from all tabs
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    tab.classList.remove('active');
  });
  
  // Show selected tab content
  document.getElementById(tabName).classList.add('active');
  
  // Add active class to clicked tab
  event.target.classList.add('active');
}

function saveAsPDF() {
  const { jsPDF } = window.jspdf;
  const element = document.getElementById('output');
  if (!element) {
    alert("Please generate plan first.");
    return;
  }

  const companyName = document.getElementById('company').value || 'Business';
  const today = new Date().toISOString().split('T')[0];

  // Force ALL tabs to be visible for PDF capture
  const tabContents = document.querySelectorAll('.tab-content');
  const originalDisplays = [];
  tabContents.forEach(tab => {
    originalDisplays.push({ tab, display: tab.style.display });
    tab.style.display = 'block';
    tab.classList.add('active'); // Ensure content is rendered
  });

  const tempStyle = document.createElement('style');
  tempStyle.innerHTML = `
    #output {
      width: 210mm !important;
      min-height: auto !important;
      padding: 15px !important;
      font-size: 10.5pt !important;
      background: white !important;
      page-break-inside: avoid;
    }
    .plan {
      padding: 15px !important;
      background: white !important;
      box-shadow: none !important;
      border: none !important;
    }
    .tabs { display: none !important; }
    .button { display: none !important; }
    table { font-size: 9.5pt !important; width: 100% !important; page-break-inside: avoid; }
    th, td { page-break-inside: avoid; }
    canvas { max-height: 180px !important; width: 100% !important; page-break-inside: avoid; }
    .charts-grid { 
      display: grid !important; 
      grid-template-columns: 1fr 1fr !important; 
      gap: 12px !important; 
      page-break-inside: avoid;
    }
    .section-title { 
      break-inside: avoid; 
      page-break-after: avoid; 
      page-break-inside: avoid;
    }
    .tab-content { 
      break-inside: avoid; 
      page-break-inside: avoid;
      margin-bottom: 30mm; /* Add space to encourage page breaks */
    }
    .tab-content:not(:first-child) {
      page-break-before: always; /* Force new page for each tab */
    }
    img.chart-image {
      max-height: 180px;
      width: 100%;
      margin: 10px 0;
      page-break-inside: avoid;
    }
  `;
  document.head.appendChild(tempStyle);

  // Convert charts to static images BEFORE capturing
  const canvases = element.querySelectorAll('canvas');
  const canvasData = [];
  
  canvases.forEach(canvas => {
    if (chartInstances[canvas.id]) {
      const img = document.createElement('img');
      img.className = 'chart-image';
      img.src = chartInstances[canvas.id].toBase64Image();
      canvasData.push({ canvas, img });
      canvas.parentNode.insertBefore(img, canvas);
      canvas.style.display = 'none';
    }
  });

  html2canvas(element, {
    scale: 1.2,
    useCORS: true,
    logging: false,
    windowWidth: 1240,
    windowHeight: document.body.scrollHeight, // Capture full height
    scrollY: -window.scrollY
  }).then(canvas => {
    const imgData = canvas.toDataURL('image/jpeg', 0.7);
    const pdf = new jsPDF('p', 'mm', 'a4');
    const imgWidth = 210;
    const pageHeight = 297;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight + 20;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    pdf.save(`${companyName} Business Plan - ${today}.pdf`);

    // CLEANUP: Restore original state
    tabContents.forEach((tab, i) => {
      tab.style.display = originalDisplays[i]?.display || '';
      tab.classList.remove('active');
    });
    
    // Restore first tab as active
    if (tabContents.length > 0) {
      tabContents[0].classList.add('active');
    }

    // Remove temp style
    document.head.removeChild(tempStyle);

    // Restore canvases
    canvasData.forEach(({canvas, img}) => {
      if (img.parentNode) {
        img.parentNode.removeChild(img);
      }
      canvas.style.display = '';
    });

  }).catch(error => {
    console.error("PDF generation error:", error);
    alert("Error generating PDF. Please try again or contact support.");
    
    // Ensure cleanup even on error
    tabContents.forEach((tab, i) => {
      tab.style.display = originalDisplays[i]?.display || '';
    });
    if (tabContents.length > 0) {
      tabContents[0].classList.add('active');
    }
    const ts = document.querySelector('style[temp-pdf-style]');
    if (ts) document.head.removeChild(ts);
  });
}

  style.id = 'temp-print-style';

      table { font-size: 9.5pt; width: 100%; border-collapse: collapse; margin: 10px 0; page-break-inside: avoid; }
      th, td { padding: 5px 6px; border: 1px solid #000; vertical-align: top; page-break-inside: avoid; }
      h1 { font-size: 15pt; margin-bottom: 8px; }
      h2 { font-size: 13pt; margin-top: 20px; margin-bottom: 6px; }
      .section-title { break-before: always; margin-top: 30px; page-break-after: avoid; }
      .tab-content { page-break-inside: avoid; }
      .tab-content:not(:first-child) { page-break-before: always; }
      img { page-break-inside: avoid; }
    }
    @page { margin: 0.5in; }
  `;
  document.head.appendChild(style);

  // Add timestamp to signature
  const signatureDiv = document.querySelector('div[style*="border-top:1px solid #e5e7eb"]');
  if (signatureDiv) {
    const timestamp = document.createElement('div');
    timestamp.style.cssText = 'text-align: center; font-size: 8.5pt; color: #666; margin: 15px 0 5px;';
    timestamp.textContent = `Printed on ${new Date().toLocaleString()} — Generated with Advanced Business Plan Generator`;
    signatureDiv.parentNode.insertBefore(timestamp, signatureDiv);
  }

  window.print();

  // Clean up
  setTimeout(() => {
    // Restore tab visibility
    tabContents.forEach((tab, i) => {
      tab.style.display = originalDisplays[i]?.display || '';
    });
    // Keep first tab active
    if (tabContents.length > 0) {
      tabContents[0].classList.add('active');
    }

    // Restore canvases
    document.querySelectorAll('canvas').forEach(c => c.style.display = '');
    tempImages.forEach(img => {
      if (img.parentNode) img.parentNode.removeChild(img);
    });

    // Remove print styles
    const printStyle = document.getElementById('temp-print-style');
    if (printStyle) printStyle.parentNode.removeChild(printStyle);

    // Remove timestamp
    const ts = document.querySelector('div[style*="Printed on"]');
    if (ts && ts.parentNode) ts.parentNode.removeChild(ts);
  }, 1000);
}

function printAsPDF() {
  const companyName = document.getElementById('company').value || 'Business';
  const today = new Date().toLocaleDateString('en-CA');

  // Convert charts to images for printing
  const chartContainers = document.querySelectorAll('.charts-grid');
  const tempImages = [];

  chartContainers.forEach(container => {
    const canvases = container.querySelectorAll('canvas');
    canvases.forEach(canvas => {
      if (!chartInstances[canvas.id]) return;

      const img = document.createElement('img');
      img.src = chartInstances[canvas.id].toBase64Image();
      img.style.cssText = 'width: 100%; max-height: 220px; margin: 10px 0; display: block;';

      canvas.parentNode.insertBefore(img, canvas.nextSibling);
      tempImages.push(img);
      canvas.style.display = 'none';
    });
  });

  // Add print styles
  const style = document.createElement('style');
  style.innerHTML = `
    @media print {
      body { font-size: 10.5pt; line-height: 1.4; background: white; }
      .card, #pageTitle, .button, .edit-hint, .tabs { display: none !important; }
      .wrap { max-width: 100%; padding: 0; margin: 0; }
      .plan { padding: 15px; background: white; box-shadow: none; }
      table { font-size: 9.5pt; width: 100%; border-collapse: collapse; margin: 10px 0; }
      th, td { padding: 5px 6px; border: 1px solid #000; vertical-align: top; }
      h1 { font-size: 15pt; margin-bottom: 8px; }
      h2 { font-size: 13pt; margin-top: 20px; margin-bottom: 6px; }
      .section-title { break-before: always; margin-top: 30px; }
      .generated-by { margin-top: 30px; font-size: 9pt; text-align: center; }
    }
    @page { margin: 0.5in; }
  `;
  document.head.appendChild(style);

  // Add timestamp to signature
  const signatureDiv = document.querySelector('div[style*="border-top:1px solid #e5e7eb"]');
  if (signatureDiv) {
    const timestamp = document.createElement('div');
    timestamp.style.cssText = 'text-align: center; font-size: 8.5pt; color: #666; margin: 15px 0 5px;';
    timestamp.textContent = `Printed on ${new Date().toLocaleString()} — Generated with Advanced Business Plan Generator`;
    signatureDiv.parentNode.insertBefore(timestamp, signatureDiv);
  }

  window.print();

  // Clean up
  setTimeout(() => {
    document.querySelectorAll('canvas').forEach(c => c.style.display = '');
    tempImages.forEach(img => img.parentNode && img.parentNode.removeChild(img));
    style.parentNode && style.parentNode.removeChild(style);
    const ts = document.querySelector('div[style*="Printed on"]');
    ts && ts.parentNode && ts.parentNode.removeChild(ts);
  }, 1000);
}
